apiVersion: v1
kind: Pod
metadata:
  name: voting-app-pod
  labels:
    name: voting-app-pod       
    app: demo-voting-app       
spec:
  containers:
    - name: voting-app
      image: kodekloud/examplevotingapp_vote:v1
      env:
        - name: REDIS_HOST
          value: "redis"        
        - name: REDIS_PORT
          value: "6379"
      ports:
        - containerPort: 80
